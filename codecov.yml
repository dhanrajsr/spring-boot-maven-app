coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  maven:
    paths:
      - src/main/java/
    carryforward: true
